name: Update Traffic Data

on:
  schedule:
    # Runs twice a month on fixed dates: the 1st and the 16th
    - cron: '0 6 1,16 * *'
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-update.txt

      - name: Download pretrained model bundle
        env:
          GH_TOKEN: ${{ github.token }}
          MODEL_RELEASE_TAG: modelos-exo-v1
          MODEL_ASSET_NAME: modelos_exo.zip
        run: |
          rm -rf modelos_exo modelos_exo.zip
          gh release download "$MODEL_RELEASE_TAG" --pattern "$MODEL_ASSET_NAME" --repo "$GITHUB_REPOSITORY"
          unzip -q "$MODEL_ASSET_NAME"
          test -d modelos_exo

      - name: Run data extraction script
        run: python extract_data.py

      - name: Run prediction updates
        run: python update_predictions.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add "TW Traffic _data.csv" predictions.csv
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update Banff traffic data and predictions" && git push)
